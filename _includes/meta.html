<br>
<hr>
<span class="entry-tags">{% for tag in page.tags %}<a href="{{ site.url }}/tags/#{{ tag }}" title="Pages tagged {{ tag }}" class="tag"><span class="term">{{ tag }}</span></a>{% unless forloop.last %}{% endunless %}{% endfor %}</span>
<span class="social-share">
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}" target="blank" title="Share on Facebook" class="tag">
        <span class="term"><i class="fa fa-facebook-square"></i></span>
    </a>
    <a href="https://twitter.com/intent/tweet?text={{ site.url }}{{ page.url }}" target="blank" title="Share on Twitter" class="tag">
        <span class="term"><i class="fa fa-twitter-square"></i></span>
    </a>
    <a href="https://www.linkedin.com/sharing/share-offsite/?mini=true&url={{ site.url }}{{ page.url }}" target="blank" title="Share on Linkedin" class="tag">
        <span class="term"><i class="fa fa-linkedin-square"></i></span>
    </a>
    <a href="https://pinterest.com/pin/create/button/?url={{ site.url }}{{ page.url }}" target="blank" title="Share on Pinterest" class="tag">
        <span class="term"><i class="fa fa-pinterest-square"></i></span>
    </a>
    <a href="https://reddit.com/submit?url={{ site.url }}{{ page.url }}&title={{ page.title | url_encode }}" target="blank" title="Share on Reddit" class="tag">
        <span class="term"><i class="fa fa-reddit-square"></i></span>
    </a>
</span>
<div style="clear:both"></div>
